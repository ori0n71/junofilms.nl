<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="About Junofilms.">
    <title>Blogs | Junofilms</title>
    <link rel="icon" type="image/x-icon" href="/images/Junofilms-favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>

    <div class="mouse-glow"></div>
    <div class="noise-overlay"></div>

    <nav class="fade-in-section">
        <div class="nav-left">
            <a href="https://junofilms.nl" class="logo">Junofilms</a>
        </div>
        <div class="nav-right">
            <a href="https://junofilms.nl/blogs" class="nav-about">Blogs</a>
            <a href="https://junofilms.nl/contact" class="btn-contact">Contact</a>
        </div>
    </nav>

    <header class="hero2 fade-in-section">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="images/J26-About-01.mp4" type="video/mp4">
        </video>
        <h1>Blogs.</h1>
    </header>

    <section class="fade-in-section project-details">
        <div class="">
            <div class="credit-row"><span class="project-description">Recent posts:</span></div>
        </div>
    </section>

    <div class="blog-preview-container fade-in-section">
        <a href="https://junofilms.nl/blogs/001" class="blog-preview-card">
            <div class="blog-preview-content">
                <h2 class="blog-title">About Junofilms</h2>
                <p class="blog-subtext">Who I am, how we got here, and what drives me.</p>
                <span class="blog-read-time">May 17th 2026, 3 min read</span>
            </div>
            <div class="blog-preview-image">
                <img src="images\Blogs\Post01.jpg">
            </div>
        </a>
    </div>
         
    <footer class="fade-in-section">
        <div class="legal">
            2026 JUNOFILMS
        </div>
        <div class="legal-link">
            <a href="https://junofilms.nl/about">About</a>
        </div>
        <div class="legal-link">
            <a href="https://junofilms.nl/contact">Contact</a>
        </div>
        <div class="legal-link">
            <a href="https://junofilms.nl/terms">Terms & Conditions</a>
        </div>
    </footer>

    <script>
        // Mouse Glow Tracking
        const glow = document.querySelector('.mouse-glow');
        document.addEventListener('mousemove', (e) => {
            window.requestAnimationFrame(() => {
                glow.style.left = `${e.clientX}px`;
                glow.style.top = `${e.clientY}px`;
            });
        });

        // Intersection Observer for Smooth Fade-In
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
    </script>
</body>
</html>
